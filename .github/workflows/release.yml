name: Release

# Publishes to PyPI when a version tag is pushed, e.g.:
#   git tag v0.8.0 && git push origin v0.8.0
# Uses PyPI trusted publishing (OIDC) — no API tokens are stored.

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  # Same doctest gate as the docs pipeline: no broken example ever ships.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pytest -m 'not integration'

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
      # Fail early if the tag doesn't match the version in pyproject.toml.
      - name: Check tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(uv version --short)"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg"
            exit 1
          fi
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/d2/
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
