services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: d2
      POSTGRES_PASSWORD: d2
      POSTGRES_DB: d2_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U d2 -d d2_test"]
      interval: 5s
      timeout: 5s
      retries: 5
