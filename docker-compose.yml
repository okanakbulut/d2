services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: norm
      POSTGRES_PASSWORD: norm
      POSTGRES_DB: norm_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U norm -d norm_test"]
      interval: 5s
      timeout: 5s
      retries: 5
